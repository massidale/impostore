name: Cleanup stale rooms

on:
  schedule:
    # Every day at 03:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install firebase-admin
        run: npm install --no-save --no-package-lock firebase-admin@^12

      - name: Run cleanup
        env:
          FIREBASE_SERVICE_ACCOUNT_B64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_B64 }}
        run: node scripts/cleanup-stale-rooms.js
